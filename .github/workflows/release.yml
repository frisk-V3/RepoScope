name: Build and Release RepoScope

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"

    - name: Compile C# (single file)
      run: |
        $csc = (Get-ChildItem "C:\Program Files\dotnet\sdk" -Recurse -Filter csc.exe | Select-Object -First 1).FullName
        & $csc /nologo /out:RepoScope.exe main.cs

    - name: Create ZIP
      run: Compress-Archive -Path RepoScope.exe -DestinationPath RepoScope-${{ github.ref_name }}.zip

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: RepoScope-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
