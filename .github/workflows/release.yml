name: Build and Release RepoScope

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"

    - name: Build normal exe
      run: |
        dotnet publish main.cs -o out -c Release -r win-x64 --self-contained false

    - name: Create ZIP
      run: Compress-Archive -Path out\* -DestinationPath RepoScope-${{ github.ref_name }}.zip

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: RepoScope-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
